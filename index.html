<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给老大的道歉信</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <canvas id="starfield"></canvas>

    <audio id="bgm" loop preload="auto">
        <source src="bgm.mp3?v=2" type="audio/mpeg">
    </audio>

    <section id="scene-wait" class="scene active">
        <div class="glow-ring"></div>
        <div class="character-wrap" id="characterBtn" role="button" aria-label="打开信件">
            <img src="character.png?v=2" alt="角色" class="character" id="characterImg">
            <div class="character-shadow"></div>
        </div>
        <div class="hint-text">
            <p class="line1">老大，点我一下嘛</p>
            <p class="line2">小恐龙有话要说，不准瞪我</p>
        </div>
    </section>

    <section id="scene-letter" class="scene">
        <div class="envelope-wrap">
            <div class="envelope" id="envelope">
                <div class="envelope-face front">
                    <svg class="seal" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 4L28.5 17.5H43L31.5 26L35.5 40L24 31.5L12.5 40L16.5 26L5 17.5H19.5L24 4Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="envelope-face back"></div>
            </div>
        </div>

        <div class="letter-paper" id="letterPaper">
            <img src="letter.jpg?v=2" alt="道歉信" class="letter-image">
        </div>
    </section>

    <section id="scene-choice" class="scene">
        <div class="choice-box">
            <p class="choice-question">所以，你愿意再给我一次机会吗？</p>
            <div class="choice-btns">
                <button class="btn btn-yes" id="btnYes">原谅你啦</button>
                <button class="btn btn-no" id="btnNo">才不要</button>
            </div>
        </div>
    </section>

    <section id="scene-result" class="scene">
        <div class="result-content" id="resultContent">
            <div class="big-heart">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 4L28.5 17.5H43L31.5 26L35.5 40L24 31.5L12.5 40L16.5 26L5 17.5H19.5L24 4Z" fill="currentColor"/>
                </svg>
            </div>
            <h2 id="resultTitle">谢谢你</h2>
            <p id="resultText">我会把这句话刻进星星里。</p>
        </div>
        <button class="btn btn-replay" id="btnReplay">再看一遍</button>
    </section>

    <div class="modal" id="modal">
        <div class="modal-box">
            <p>我知道我还没做好，但请别关掉这扇窗。</p>
            <p>再给我一点时间，好吗？</p>
            <button class="btn btn-yes" id="btnModalOk">好</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="main.js?v=2"></script>
</body>
</html>
